version: "3.9"

services:
  frontend:
    image: gonzalo25u/frontend:latest
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - nginx_logs:/var/log/nginx
    networks:
      - web-network

volumes:
  nginx_logs:
    driver: local

networks:
  web-network:
    driver: bridge