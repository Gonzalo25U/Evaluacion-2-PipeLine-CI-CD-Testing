name: CI/CD - Frontend

# Trigger: solo en push a la rama "deploy"
on:
  push:
    branches: [deploy]

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Construir imagen Docker y publicar en Docker Hub
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: 🔨 Build & Push imagen Docker
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Descargar el código del repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # Paso 2: Autenticarse en Docker Hub con secrets del repositorio
      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 3: Configurar Buildx para builds optimizados con caché
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Paso 4: Construir y publicar imagen con dos tags:
      #   - :latest        → siempre apunta a la versión más reciente
      #   - :<sha commit>  → permite rollback a una versión específica
      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            gonzalo25u/frontend:latest
            gonzalo25u/frontend:${{ github.sha }}
          no-cache: true

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Desplegar en EC2 "web" (acceso SSH directo desde internet)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy en EC2 web
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # Paso 1: Descargar código para copiar docker-compose al servidor
      - name: Checkout código
        uses: actions/checkout@v4

      # Paso 2: Copiar docker-compose.yml al servidor EC2 web
      - name: Copiar docker-compose a EC2 web
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_WEB_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.EC2_USER }}/frontend"

      # Paso 3: Conectarse a EC2 "web" y ejecutar el deploy
      - name: Deploy en EC2 web
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_WEB_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/frontend

            # Pull de la nueva imagen y reiniciar contenedor
            docker compose pull
            docker compose up -d --remove-orphans

            # Limpiar imágenes antiguas para liberar espacio
            docker image prune -f
