name: CI/CD Pipeline - Monorepo

# Trigger: solo en push a la rama "deploy"
on:
  push:
    branches: [deploy]

jobs:

  # JOB 1: Pruebas unitarias - Backend Ventas
  test-ventas:
    name: Tests Backend Ventas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar tests
        working-directory: ./backend-ventas
        run: mvn test jacoco:report -B -Dtest="VentaServiceImplTest" -DfailIfNoTests=false

      - name: Publicar reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cobertura-ventas
          path: backend-ventas/target/site/jacoco/

  # JOB 2: Pruebas unitarias - Backend Despachos
  test-despachos:
    name: Tests Backend Despachos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar tests
        working-directory: ./backend-despachos
        run: mvn test jacoco:report -B -Dtest="DespachoServiceImplTest" -DfailIfNoTests=false

      - name: Publicar reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cobertura-despachos
          path: backend-despachos/target/site/jacoco/

  # JOB 3: Análisis de código con SonarCloud
  sonar-ventas:
    name: SonarCloud - Backend Ventas
    runs-on: ubuntu-latest
    needs: test-ventas

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build y cobertura
        working-directory: ./backend-ventas
        run: mvn verify jacoco:report -B -Dtest="VentaServiceImplTest" -DfailIfNoTests=false

      - name: Análisis SonarCloud
        working-directory: ./backend-ventas
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=gonzalo25u_backend-ventas \
            -Dsonar.organization=gonzalo25u \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -B

  sonar-despachos:
    name: SonarCloud - Backend Despachos
    runs-on: ubuntu-latest
    needs: test-despachos

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build y cobertura
        working-directory: ./backend-despachos
        run: mvn verify jacoco:report -B -Dtest="DespachoServiceImplTest" -DfailIfNoTests=false

      - name: Análisis SonarCloud
        working-directory: ./backend-despachos
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=gonzalo25u_backend-despachos \
            -Dsonar.organization=gonzalo25u \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -B

  # JOB 4: Build y Push de imágenes Docker a Docker Hub
  build-and-push:
    name: Build & Push imágenes Docker
    runs-on: ubuntu-latest
    needs: [sonar-ventas, sonar-despachos]

    strategy:
      matrix:
        service:
          - name: frontend
            context: ./frontend
          - name: backend-ventas
            context: ./backend-ventas
          - name: backend-despachos
            context: ./backend-despachos

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y Push → ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            gonzalo25u/${{ matrix.service.name }}:latest
            gonzalo25u/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max

  # JOB 5: Deploy MySQL en EC2 "data" (doble jump host: web → app → data)
  deploy-data:
    name: Deploy MySQL en EC2 data
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar llave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Agregar EC2 web a known_hosts
          ssh-keyscan -H ${{ secrets.EC2_WEB_HOST }} >> ~/.ssh/known_hosts
          # Agregar EC2 app a known_hosts via web
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/id_rsa \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_WEB_HOST }} \
              "ssh-keyscan -H ${{ secrets.EC2_APP_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          # Agregar EC2 data a known_hosts via web → app
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump=${{ secrets.EC2_USER }}@${{ secrets.EC2_WEB_HOST }} \
              -i ~/.ssh/id_rsa \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_APP_HOST }} \
              "ssh-keyscan -H ${{ secrets.EC2_DATA_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Crear directorio en EC2 data
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump=${{ secrets.EC2_USER }}@${{ secrets.EC2_WEB_HOST }},${{ secrets.EC2_USER }}@${{ secrets.EC2_APP_HOST }} \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_DATA_HOST }} \
              "mkdir -p /home/${{ secrets.EC2_USER }}/data"

      - name: Copiar docker-compose a EC2 data
        run: |
          scp -o StrictHostKeyChecking=no \
              -o ProxyJump=${{ secrets.EC2_USER }}@${{ secrets.EC2_WEB_HOST }},${{ secrets.EC2_USER }}@${{ secrets.EC2_APP_HOST }} \
              ./data/docker-compose.yml \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_DATA_HOST }}:/home/${{ secrets.EC2_USER }}/data/

      - name: Deploy MySQL en EC2 data
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump=${{ secrets.EC2_USER }}@${{ secrets.EC2_WEB_HOST }},${{ secrets.EC2_USER }}@${{ secrets.EC2_APP_HOST }} \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_DATA_HOST }} << 'ENDSSH'

            cd /home/${{ secrets.EC2_USER }}/data

            cat > .env << EOF
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.DB_NAME }}
            MYSQL_USER=${{ secrets.DB_USERNAME }}
            MYSQL_PASSWORD=${{ secrets.DB_PASSWORD }}
            EOF

            docker-compose pull
            docker-compose up -d --remove-orphans

          ENDSSH

  # JOB 6: Deploy backends en EC2 "app" (jump host: web → app)
  deploy-app:
    name: Deploy backends en EC2 app
    runs-on: ubuntu-latest
    needs: deploy-data

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar llave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_WEB_HOST }} >> ~/.ssh/known_hosts

      - name: Crear directorios en EC2 app
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump=${{ secrets.EC2_USER }}@${{ secrets.EC2_WEB_HOST }} \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_APP_HOST }} \
              "mkdir -p ~/backend-ventas ~/backend-despachos"

      - name: Copiar docker-compose de ventas a EC2 app
        run: |
          scp -o StrictHostKeyChecking=no \
              -o ProxyJump=${{ secrets.EC2_USER }}@${{ secrets.EC2_WEB_HOST }} \
              ./backend-ventas/docker-compose.yml \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_APP_HOST }}:~/backend-ventas/

      - name: Copiar docker-compose de despachos a EC2 app
        run: |
          scp -o StrictHostKeyChecking=no \
              -o ProxyJump=${{ secrets.EC2_USER }}@${{ secrets.EC2_WEB_HOST }} \
              ./backend-despachos/docker-compose.yml \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_APP_HOST }}:~/backend-despachos/

      - name: Deploy backends en EC2 app
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ProxyJump=${{ secrets.EC2_USER }}@${{ secrets.EC2_WEB_HOST }} \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_APP_HOST }} << 'ENDSSH'

            cd ~/backend-ventas
            cat > .env << EOF
            DB_ENDPOINT=${{ secrets.EC2_DATA_HOST }}
            DB_PORT=3306
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            EOF
            docker-compose pull
            docker-compose up -d --remove-orphans

            cd ~/backend-despachos
            cat > .env << EOF
            DB_ENDPOINT=${{ secrets.EC2_DATA_HOST }}
            DB_PORT=3306
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            EOF
            docker-compose pull
            docker-compose up -d --remove-orphans

            docker image prune -f

          ENDSSH

  # JOB 7: Deploy frontend en EC2 "web" (acceso SSH directo)
  deploy-web:
    name: Deploy frontend en EC2 web
    runs-on: ubuntu-latest
    needs: deploy-app

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Crear directorio en EC2 web
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_WEB_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: mkdir -p ~/frontend

      - name: Copiar docker-compose a EC2 web
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_WEB_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/docker-compose.yml"
          target: "/home/${{ secrets.EC2_USER }}/frontend"
          strip_components: 1

      - name: Deploy frontend en EC2 web
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_WEB_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/frontend
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker image prune -f